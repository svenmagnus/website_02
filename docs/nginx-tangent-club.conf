# Tangent Club — Nginx reverse proxy (Hetzner)
# Install: copied by server/scripts/setup-hetzner.sh (HTTP only).
# After DNS A records for tangent-club.com AND www → server IP:
#   certbot --nginx -d tangent-club.com -d www.tangent-club.com
# Certbot will extend this file with SSL listen 443 and redirects.

server {
    listen 80;
    listen [::]:80;
    server_name tangent-club.com www.tangent-club.com;

    location / {
        client_max_body_size 6m;
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
