<!DOCTYPE html>
<html lang="en">
  <head>
    <script src="assets/theme-init.js?v=8612"></script>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Forgot password — Tangent Club</title>
    <link rel="stylesheet" href="assets/styles.css?v=8612" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  </head>
  <body class="auth-page">
    <main class="auth-page-main">
      <a href="index.html" class="logo-link auth-logo">
        <img src="assets/logo.png" alt="Tangent-Club Logo" class="site-logo site-logo--theme-dark" />
        <img src="assets/logo-light.svg" alt="Tangent-Club Logo" class="site-logo site-logo--theme-light" />
      </a>
      <div class="login-overlay-card auth-card auth-card-wide">
        <h1>Forgot password</h1>
        <p class="login-overlay-hint">
          Enter the <strong>email</strong> or <strong>username</strong> for your account. If we find a match, we send
          reset instructions to the email on file.
        </p>
        <form id="forgotPasswordForm" class="profile-form">
          <div class="row">
            <label for="forgotIdentifier">Email or username</label>
            <input
              type="text"
              id="forgotIdentifier"
              required
              autocomplete="username"
              placeholder="you@example.com or your username"
            />
          </div>
          <p class="login-overlay-error" id="forgotPasswordError" hidden></p>
          <p class="status-line" id="forgotPasswordStatus" hidden></p>
          <p class="status-line" id="forgotPasswordDevLink" hidden></p>
          <button type="submit" class="primary" id="forgotPasswordSubmit">Send reset link</button>
        </form>
        <p class="status-line" style="margin-top: 1rem">
          <a href="index.html">Back to sign in</a>
        </p>
      </div>
    </main>
    <script src="assets/api-config.js?v=8612"></script>
    <script src="assets/ui-shell.js?v=8612"></script>
    <script src="assets/auth.js?v=8612"></script>
  </body>
</html>
