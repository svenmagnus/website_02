<!DOCTYPE html>
<html lang="en">
  <head>
    <script src="assets/theme-init.js?v=8631"></script>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Continue subscription — Tangent Club</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/styles.css?v=8633" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
  </head>
  <body class="continue-subscription-page">
    <header class="main-header continue-subscription-header">
      <div class="header-left">
        <a href="index.html" class="logo-link" aria-label="Tangent Club home">
          <img src="assets/logo.png" alt="Tangent Club" class="site-logo site-logo--theme-dark" />
          <img src="assets/logo-light.svg" alt="Tangent Club" class="site-logo site-logo--theme-light" />
        </a>
      </div>
      <nav class="header-nav" aria-label="Account">
        <button type="button" class="logout-link" id="renewalHeaderLogoutBtn">Log out</button>
        <div class="account-menu" id="accountMenu">
          <button
            type="button"
            class="account-trigger"
            id="accountMenuBtn"
            aria-expanded="false"
            aria-haspopup="true"
            aria-controls="accountDropdown"
          >
            <span class="account-avatar" data-account-avatar>
              <img class="account-avatar-photo" data-profile-avatar-photo alt="" width="32" height="32" hidden />
              <span data-profile-initial>G</span>
            </span>
          </button>
          <div class="account-dropdown" id="accountDropdown" hidden role="menu">
            <div class="account-dropdown-head">
              <span class="account-avatar account-avatar-lg" data-account-avatar>
                <img class="account-avatar-photo" data-profile-avatar-photo alt="" width="40" height="40" hidden />
                <span data-profile-initial>G</span>
              </span>
              <div class="account-dropdown-meta">
                <span class="account-name" data-profile-name>Guest</span>
                <span class="account-role" id="accountRoleLabel">Member</span>
              </div>
            </div>
            <div class="account-dropdown-item account-theme-picker" role="group" aria-label="Appearance">
              <span class="account-theme-picker-label">
                <i class="bi bi-palette" aria-hidden="true"></i>
                Appearance
              </span>
              <div class="theme-segmented" data-theme-segmented>
                <button type="button" class="theme-segment" data-theme-value="cb-light" aria-pressed="false">
                  Light
                </button>
                <button type="button" class="theme-segment" data-theme-value="cb-dark" aria-pressed="false">
                  Dark
                </button>
                <button type="button" class="theme-segment" data-theme-value="hippie" aria-pressed="false">
                  Hippie
                </button>
                <button type="button" class="theme-segment" data-theme-value="neon" aria-pressed="false">
                  Neon
                </button>
              </div>
            </div>
            <div class="account-dropdown-divider" role="separator"></div>
            <button type="button" class="account-dropdown-item account-dropdown-danger" id="renewalLogoutBtn" role="menuitem">
              <i class="bi bi-box-arrow-right" aria-hidden="true"></i>
              <span>Sign out</span>
            </button>
          </div>
        </div>
      </nav>
    </header>

    <main class="continue-subscription-main">
      <div class="continue-subscription-card card">
        <h1>Continue your membership</h1>
        <p class="continue-subscription-lead" id="renewalIntro">
          Your free trial has ended. Continue your subscription to restore access to private sessions, chat, and
          Lovense sync.
        </p>

        <section class="settings-section" id="settingsBillingSection" aria-labelledby="renewalBillingHeading">
          <h2 id="renewalBillingHeading">Membership &amp; billing</h2>
          <div class="settings-billing-card" id="settingsBillingCard">
            <div class="settings-billing-status-row">
              <span class="settings-billing-badge" id="settingsBillingBadge" hidden></span>
            </div>
            <dl class="settings-billing-details" id="settingsBillingDetails"></dl>
            <p class="status-line" id="settingsBillingNote"></p>
            <p class="status-line err" id="settingsBillingError" hidden></p>
            <div class="settings-billing-actions">
              <button type="button" class="primary" id="settingsBillingCheckoutBtn" hidden>
                Continue subscription
              </button>
              <button type="button" class="secondary" id="settingsBillingPortalBtn" hidden>
                Manage billing
              </button>
            </div>
          </div>
        </section>

        <p class="continue-subscription-foot">
          Questions?
          <a href="support.html">Contact support</a>
          ·
          <a href="anleitung.html">User guide</a>
        </p>
        <p class="continue-subscription-signout">
          <button type="button" class="linkish" id="renewalPageLogoutBtn">Sign out</button>
        </p>
      </div>
    </main>

    <footer class="continue-subscription-footer">
      <p>Tangent Club · Platform membership</p>
    </footer>

    <script src="assets/api-config.js?v=8631"></script>
    <script src="assets/ui-shell.js?v=8631"></script>
    <script src="assets/auth.js?v=8633"></script>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        if (window.dualPeerUi) window.dualPeerUi.initShell();
      });
    </script>
  </body>
</html>
