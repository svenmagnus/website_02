<!DOCTYPE html>
<html lang="en" data-theme="cb-dark">
  <head>
    <script>
      (function () {
        try {
          var t = localStorage.getItem("dualpeer-theme") || "cb-dark";
          if (t === "cb-dark" || t === "cb-light" || t === "original") {
            document.documentElement.setAttribute("data-theme", t === "original" ? "cb-dark" : t);
          }
        } catch (_) {}
      })();
    </script>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Register — Dual-Peer</title>
    <link rel="stylesheet" href="assets/styles.css?v=8404" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  </head>
  <body class="auth-page">
    <main class="auth-page-main auth-page-main-wide">
      <a href="index.html" class="logo-link auth-logo">
        <img src="assets/logo.png" alt="Tangent-Club Logo" />
      </a>
      <div class="login-overlay-card auth-card">
        <h1>Create your account</h1>
        <p class="status-line" id="registerApiStatus">Server wird geprüft …</p>
        <p class="status-line" id="registerInviteInfo">Checking invitation…</p>
        <input type="hidden" id="registerInviteToken" value="" />
        <form id="registerForm" class="profile-form">
          <div class="row">
            <label for="registerEmail">E-Mail</label>
            <input
              type="email"
              id="registerEmail"
              required
              autocomplete="email"
              placeholder="deine@email.de"
            />
            <p class="status-line profile-field-hint" id="registerEmailHint"></p>
          </div>
          <div class="row" id="registerInviteCodeRow">
            <label for="registerInviteCode">Einladungscode (optional)</label>
            <input
              type="text"
              id="registerInviteCode"
              inputmode="numeric"
              pattern="[0-9]{6}"
              maxlength="6"
              placeholder="6-stellig, steht in der Einladungs-E-Mail"
              autocomplete="one-time-code"
            />
          </div>
          <div class="row">
            <label for="registerUsername">Benutzername</label>
            <input type="text" id="registerUsername" required autocomplete="username" pattern="[a-zA-Z0-9_]{3,24}" />
          </div>
          <div class="row">
            <label for="registerPassword">Password</label>
            <input type="password" id="registerPassword" required autocomplete="new-password" minlength="8" />
          </div>
          <div class="row">
            <label for="registerDisplayName">Display name</label>
            <input type="text" id="registerDisplayName" maxlength="32" placeholder="Shown in chat" />
          </div>
          <div class="row">
            <label for="registerGender">Gender</label>
            <select id="registerGender">
              <option value="">Prefer not to say</option>
              <option value="female">Female</option>
              <option value="male">Male</option>
              <option value="nonbinary">Non-binary</option>
              <option value="other">Other</option>
            </select>
          </div>
          <div class="row">
            <label for="registerBio">About you</label>
            <textarea id="registerBio" rows="3" maxlength="500"></textarea>
          </div>
          <fieldset class="profile-techniques-field">
            <legend>Techniques you are open to</legend>
            <div id="registerTechniqueList" class="profile-technique-list"></div>
          </fieldset>
          <p class="login-overlay-error" id="registerError" hidden></p>
          <button type="submit" class="primary">Konto erstellen</button>
        </form>
        <div id="registerSuccessPanel" class="auth-success-panel" hidden>
          <p class="status-line ok" id="registerSuccessMessage"></p>
          <p class="status-line" id="registerDevVerify" hidden></p>
          <p class="status-line" style="margin-top: 1rem">
            <a href="index.html?premium=1">Premium anmelden</a>
          </p>
        </div>
        <p class="status-line" style="margin-top: 1rem">
          Bereits registriert? <a href="index.html?premium=1">Premium anmelden</a> · Erster Host?
          <a href="register.html">Register without invite</a> (only if no accounts exist yet).
        </p>
      </div>
    </main>
    <script src="assets/ui-shell.js?v=8411"></script>
    <script src="assets/app.js?v=8411"></script>
    <script src="assets/auth.js?v=8411"></script>
  </body>
</html>
