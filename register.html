<!DOCTYPE html>
<html lang="en" data-theme="cb-dark">
  <head>
    <script>
      (function () {
        try {
          var t = localStorage.getItem("dualpeer-theme") || "cb-dark";
          if (t === "cb-dark" || t === "cb-light" || t === "original") {
            document.documentElement.setAttribute("data-theme", t === "original" ? "cb-dark" : t);
          }
        } catch (_) {}
      })();
    </script>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Create Account — Tangent Club</title>
    <link rel="stylesheet" href="assets/styles.css?v=8430" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  </head>
  <body class="auth-page">
    <main class="auth-page-main">
      <a href="index.html" class="logo-link auth-logo">
        <img src="assets/logo.png" alt="Tangent-Club Logo" class="site-logo site-logo--theme-dark" />
        <img src="assets/logo-light.svg" alt="Tangent-Club Logo" class="site-logo site-logo--theme-light" />
      </a>
      <div class="login-overlay-card auth-card">
        <h1>Create Account</h1>
        <p class="status-line" id="registerApiStatus" hidden></p>
        <p class="status-line" id="registerInviteInfo"></p>
        <input type="hidden" id="registerInviteToken" value="" />
        <form id="registerForm" class="profile-form">
          <div class="row">
            <label for="registerEmail">Email</label>
            <input
              type="email"
              id="registerEmail"
              required
              autocomplete="email"
              placeholder="you@example.com"
            />
            <p class="status-line profile-field-hint" id="registerEmailHint"></p>
          </div>
          <div class="row" id="registerInviteCodeRow">
            <label for="registerInviteCode">Invitation Code (4 digits)</label>
            <input
              type="text"
              id="registerInviteCode"
              inputmode="numeric"
              pattern="[0-9]{4}"
              maxlength="4"
              placeholder="from invitation"
              autocomplete="one-time-code"
            />
          </div>
          <div class="row">
            <label for="registerUsername">Please choose a Username</label>
            <input
              type="text"
              id="registerUsername"
              required
              autocomplete="username"
              pattern="[a-zA-Z0-9_]{3,24}"
              placeholder="3–24 characters"
            />
          </div>
          <div class="row">
            <label for="registerPassword">Password</label>
            <input
              type="password"
              id="registerPassword"
              required
              autocomplete="new-password"
              minlength="8"
              placeholder="at least 8 characters"
            />
          </div>
          <p class="status-line profile-field-hint">
            You can set your profile details under <strong>Profile</strong> after logging in.
          </p>
          <p class="login-overlay-error" id="registerError" hidden></p>
          <div class="register-submit-gap" aria-hidden="true"></div>
          <button type="submit" class="primary">Create Account</button>
        </form>
        <div id="registerSuccessPanel" class="auth-success-panel" hidden>
          <p class="status-line ok" id="registerSuccessMessage"></p>
          <p class="status-line" id="registerSuccessEmailHint" hidden></p>
          <p class="status-line" id="registerDevVerify" hidden></p>
          <p class="status-line" style="margin-top: 1rem">
            <a href="index.html?onboard=1">Go to app</a>
            ·
            <a href="index.html">Home</a>
          </p>
        </div>
        <p class="status-line" style="margin-top: 1rem">
          Already registered? <a href="index.html">Log in</a>
        </p>
      </div>
    </main>
    <script src="assets/api-config.js?v=8428"></script>
    <script src="assets/ui-shell.js?v=8428"></script>
    <script src="assets/app.js?v=8428"></script>
    <script src="assets/auth.js?v=8428"></script>
  </body>
</html>
