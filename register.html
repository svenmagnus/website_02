<!DOCTYPE html>
<html lang="de" data-theme="cb-dark">
  <head>
    <script>
      (function () {
        try {
          var t = localStorage.getItem("dualpeer-theme") || "cb-dark";
          if (t === "cb-dark" || t === "cb-light" || t === "original") {
            document.documentElement.setAttribute("data-theme", t === "original" ? "cb-dark" : t);
          }
        } catch (_) {}
      })();
    </script>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Konto erstellen — Tangent Club</title>
    <link rel="stylesheet" href="assets/styles.css?v=8415" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  </head>
  <body class="auth-page">
    <main class="auth-page-main">
      <a href="index.html" class="logo-link auth-logo">
        <img src="assets/logo.png" alt="Tangent-Club Logo" />
      </a>
      <div class="login-overlay-card auth-card">
        <h1>Konto erstellen</h1>
        <p class="status-line" id="registerApiStatus">Server wird geprüft …</p>
        <p class="status-line" id="registerInviteInfo"></p>
        <input type="hidden" id="registerInviteToken" value="" />
        <form id="registerForm" class="profile-form">
          <div class="row">
            <label for="registerEmail">E-Mail</label>
            <input
              type="email"
              id="registerEmail"
              required
              autocomplete="email"
              placeholder="deine@email.de"
            />
            <p class="status-line profile-field-hint" id="registerEmailHint"></p>
          </div>
          <div class="row" id="registerInviteCodeRow">
            <label for="registerInviteCode">Einladungscode (4 Ziffern)</label>
            <input
              type="text"
              id="registerInviteCode"
              inputmode="numeric"
              pattern="[0-9]{4}"
              maxlength="4"
              placeholder="aus der Einladungs-E-Mail"
              autocomplete="one-time-code"
            />
          </div>
          <div class="row">
            <label for="registerUsername">Benutzername</label>
            <input
              type="text"
              id="registerUsername"
              required
              autocomplete="username"
              pattern="[a-zA-Z0-9_]{3,24}"
              placeholder="3–24 Zeichen"
            />
          </div>
          <div class="row">
            <label for="registerPassword">Passwort</label>
            <input
              type="password"
              id="registerPassword"
              required
              autocomplete="new-password"
              minlength="8"
              placeholder="mindestens 8 Zeichen"
            />
          </div>
          <p class="status-line profile-field-hint">
            Profildetails legst du nach der Anmeldung unter <strong>Profil</strong> fest.
          </p>
          <p class="login-overlay-error" id="registerError" hidden></p>
          <button type="submit" class="primary">Konto erstellen</button>
        </form>
        <div id="registerSuccessPanel" class="auth-success-panel" hidden>
          <p class="status-line ok" id="registerSuccessMessage"></p>
          <p class="status-line" id="registerDevVerify" hidden></p>
          <p class="status-line" style="margin-top: 1rem">
            <a href="welcome.html">Zum Profil</a>
            ·
            <a href="index.html">Zur Startseite</a>
          </p>
        </div>
        <p class="status-line" style="margin-top: 1rem">
          Bereits registriert? <a href="index.html">Anmelden</a>
        </p>
      </div>
    </main>
    <script src="assets/api-config.js?v=8416"></script>
    <script src="assets/ui-shell.js?v=8416"></script>
    <script src="assets/app.js?v=8416"></script>
    <script src="assets/auth.js?v=8416"></script>
  </body>
</html>
