<!DOCTYPE html>
<html lang="en">
  <head>
    <script src="assets/theme-init.js?v=8612"></script>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Reset password — Tangent Club</title>
    <link rel="stylesheet" href="assets/styles.css?v=8612" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  </head>
  <body class="auth-page">
    <main class="auth-page-main">
      <a href="index.html" class="logo-link auth-logo">
        <img src="assets/logo.png" alt="Tangent-Club Logo" class="site-logo site-logo--theme-dark" />
        <img src="assets/logo-light.svg" alt="Tangent-Club Logo" class="site-logo site-logo--theme-light" />
      </a>
      <div class="login-overlay-card auth-card auth-card-wide">
        <h1>Choose a new password</h1>
        <p class="status-line" id="resetPasswordIntro" hidden></p>
        <form id="resetPasswordForm" class="profile-form" hidden>
          <div class="row">
            <label for="resetPasswordNew">New password</label>
            <div class="password-input-wrap">
              <input
                type="password"
                id="resetPasswordNew"
                required
                autocomplete="new-password"
                minlength="8"
                placeholder="at least 8 characters"
              />
              <button
                type="button"
                class="password-toggle-btn"
                data-password-toggle
                aria-controls="resetPasswordNew"
                aria-label="Show password"
                aria-pressed="false"
              >
                <i class="bi bi-eye" aria-hidden="true"></i>
              </button>
            </div>
          </div>
          <div class="row">
            <label for="resetPasswordConfirm">Confirm password</label>
            <div class="password-input-wrap">
              <input
                type="password"
                id="resetPasswordConfirm"
                required
                autocomplete="new-password"
                minlength="8"
                placeholder="repeat password"
              />
              <button
                type="button"
                class="password-toggle-btn"
                data-password-toggle
                aria-controls="resetPasswordConfirm"
                aria-label="Show password"
                aria-pressed="false"
              >
                <i class="bi bi-eye" aria-hidden="true"></i>
              </button>
            </div>
          </div>
          <p class="login-overlay-error" id="resetPasswordError" hidden></p>
          <button type="submit" class="primary" id="resetPasswordSubmit">Update password</button>
        </form>
        <p class="status-line" id="resetPasswordStatus"></p>
        <p class="status-line" id="resetPasswordSuccess" hidden>
          <a href="index.html">Sign in with your new password</a>
        </p>
        <p class="status-line" style="margin-top: 1rem">
          <a href="forgot-password.html">Request a new reset link</a>
          ·
          <a href="index.html">Back to sign in</a>
        </p>
      </div>
    </main>
    <script src="assets/api-config.js?v=8612"></script>
    <script src="assets/ui-shell.js?v=8629"></script>
    <script src="assets/auth.js?v=8629"></script>
  </body>
</html>
